# ============================================
# TactoFlow Production Docker Compose
# ============================================

version: "3.9"

services:
  # ===========================================
  # PostgreSQL Database with pgvector
  # ===========================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: tactoflow_postgres_prod
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-tacto}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:-tacto_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-tacto} -d ${DB_NAME:-tacto_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tactoflow_network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # ===========================================
  # Redis Cache
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: tactoflow_redis_prod
    restart: always
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tactoflow_network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # ===========================================
  # TactoFlow API
  # ===========================================
  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: tactoflow_api_prod
    restart: always
    env_file:
      - .env.prod
    environment:
      # Overrides — internal Docker network hostnames override .env.prod values
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - tactoflow_network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
      replicas: 1

  # ===========================================
  # Nginx Reverse Proxy (Optional)
  # ===========================================
  nginx:
    image: nginx:alpine
    container_name: tactoflow_nginx_prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    networks:
      - tactoflow_network
    profiles:
      - with-nginx

networks:
  tactoflow_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
